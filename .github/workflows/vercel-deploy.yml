name: Vercel Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        env:
          DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "HATA: VERCEL_DEPLOY_HOOK secret yok."
            exit 1
          fi
          RESPONSE=$(curl -fsS -X POST "$DEPLOY_HOOK")
          echo "$RESPONSE"
          echo "Deploy tetiklendi. Vercel Deployments sayfasini kontrol et."
