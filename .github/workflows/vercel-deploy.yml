name: Vercel Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        env:
          DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "HATA: VERCEL_DEPLOY_HOOK secret yok."
            exit 1
          fi
          RESPONSE=$(curl -fsS -X POST "$DEPLOY_HOOK" || true)
          echo "$RESPONSE"
          echo ""
          echo "=============================================="
          echo "NOT: Deploy 'blocked' veya 'Pro' isterse:"
          echo "1) vercel.com → personal Hobby hesap"
          echo "2) Add New Project → Import hfrz-27/mepotia"
          echo "3) Domain: mepotia.com ekle"
          echo "VEYA Netlify ücretsiz: netlify.com → Import repo"
          echo "=============================================="
