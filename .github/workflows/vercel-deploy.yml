name: Vercel Production Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Set git author for Vercel Hobby
        run: |
          git config --global user.email "hay98dar@gmail.com"
          git config --global user.name "Mepotia"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel project settings
        run: npx vercel@latest pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for production
        run: npx vercel@latest build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: |
          DEPLOY_URL=$(npx vercel@latest deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "Deploy URL: $DEPLOY_URL"

      - name: Check live version endpoint
        run: |
          sleep 20
          CODE=$(curl -s -o /dev/null -w "%{http_code}" https://mepotia.com/api/version)
          echo "mepotia.com/api/version => HTTP $CODE"
          if [ "$CODE" != "200" ]; then
            echo "Site henuz guncellenmemis olabilir. Vercel Deployments kontrol et."
            exit 1
          fi
