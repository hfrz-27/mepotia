name: Vercel Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Resolve project + production deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "VERCEL_TOKEN secret yok"
            exit 1
          fi

          curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects?limit=50" \
            -o /tmp/projects.json

          node <<'NODE'
          const fs = require("fs");
          const j = JSON.parse(fs.readFileSync("/tmp/projects.json", "utf8"));
          const arr = j.projects || [];
          if (!arr.length) {
            console.error("Proje yok:", JSON.stringify(j).slice(0, 400));
            process.exit(2);
          }
          const p =
            arr.find((x) => /^mepotia$/i.test(x.name || "")) ||
            arr.find((x) => /mepotia/i.test(x.name || "")) ||
            arr[0];
          const out = { projectId: p.id, orgId: p.accountId, name: p.name };
          fs.writeFileSync("/tmp/resolved.json", JSON.stringify(out));
          console.log("Resolved:", JSON.stringify(out));
          NODE

          export VERCEL_PROJECT_ID=$(node -e "console.log(require('/tmp/resolved.json').projectId)")
          export VERCEL_ORG_ID=$(node -e "console.log(require('/tmp/resolved.json').orgId)")
          echo "PROJECT=$VERCEL_PROJECT_ID ORG=$VERCEL_ORG_ID"

          mkdir -p .vercel
          printf '%s\n' "{\"projectId\":\"$VERCEL_PROJECT_ID\",\"orgId\":\"$VERCEL_ORG_ID\"}" > .vercel/project.json

          # Kaynak kodu Vercel'de build et (env orada dolu — prebuilt CLI env bozuluyor)
          echo "== vercel deploy --prod (remote build) =="
          set +e
          OUT=$(vercel deploy --prod --yes --token="$VERCEL_TOKEN" 2>&1)
          CODE=$?
          set -e
          echo "$OUT"
          if [ $CODE -ne 0 ]; then
            echo "CLI deploy failed code=$CODE"
            if [ -n "${DEPLOY_HOOK:-}" ]; then
              echo "Fallback deploy hook..."
              curl -fsS -X POST "$DEPLOY_HOOK" || true
            fi
            exit $CODE
          fi
          echo "Deploy OK"
