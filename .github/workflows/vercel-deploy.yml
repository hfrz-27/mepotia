name: Vercel Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Resolve project + production deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SECRET_ORG: ${{ secrets.VERCEL_ORG_ID }}
          SECRET_PROJECT: ${{ secrets.VERCEL_PROJECT_ID }}
          DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "VERCEL_TOKEN secret yok"
            exit 1
          fi

          # Tam JSON (kesme yok)
          curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects?limit=50" \
            -o /tmp/projects.json

          node <<'NODE'
          const fs = require("fs");
          const j = JSON.parse(fs.readFileSync("/tmp/projects.json", "utf8"));
          const arr = j.projects || [];
          if (!arr.length) {
            console.error("Token ile proje listesi boş:", JSON.stringify(j).slice(0, 500));
            process.exit(2);
          }
          const p =
            arr.find((x) => /^mepotia$/i.test(x.name || "")) ||
            arr.find((x) => /mepotia/i.test(x.name || "")) ||
            arr[0];
          const out = {
            projectId: p.id,
            orgId: p.accountId,
            name: p.name,
            framework: p.framework,
          };
          fs.writeFileSync("/tmp/resolved.json", JSON.stringify(out, null, 2));
          console.log("Resolved:", JSON.stringify(out));
          NODE

          export VERCEL_PROJECT_ID=$(node -e "console.log(require('/tmp/resolved.json').projectId)")
          export VERCEL_ORG_ID=$(node -e "console.log(require('/tmp/resolved.json').orgId)")
          echo "Using PROJECT=$VERCEL_PROJECT_ID ORG=$VERCEL_ORG_ID"
          echo "Secret PROJECT was set: $([ -n "${SECRET_PROJECT:-}" ] && echo yes || echo no) (ignored if wrong)"

          # .vercel/project.json yaz
          mkdir -p .vercel
          cat > .vercel/project.json <<EOF
          {"projectId":"$VERCEL_PROJECT_ID","orgId":"$VERCEL_ORG_ID"}
          EOF

          echo "== pull production env =="
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

          echo "== build =="
          vercel build --prod --token="$VERCEL_TOKEN"

          echo "== deploy production =="
          URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" 2>&1 | tee /tmp/deploy.out | tail -n 1)
          cat /tmp/deploy.out
          echo "URL=$URL"

          # Deploy hook yedek
          if [ -n "${DEPLOY_HOOK:-}" ]; then
            echo "== also ping deploy hook =="
            curl -fsS -X POST "$DEPLOY_HOOK" || true
          fi
